<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Worker Dashboard - Smart Garbage</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .status-badge {
      padding: 6px 14px;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">

<div class="max-w-7xl mx-auto px-6 py-8">
  <!-- Header -->
  <div class="flex justify-between items-center mb-10">
    <div class="flex items-center gap-4">
      <div class="text-4xl">👷</div>
      <div>
        <h1 class="text-3xl font-bold">Worker Dashboard</h1>
        <p class="text-emerald-400">Welcome back, Field Worker</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div id="workerInfo" class="text-right">
        <p class="font-medium" id="workerName">Ramesh Kumar</p>
        <p class="text-sm text-zinc-400" id="workerMobile">98765 43210</p>
      </div>
      <button onclick="logout()" 
        class="px-6 py-3 bg-red-600 hover:bg-red-700 rounded-2xl text-sm font-medium">
        Logout
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

    <!-- Left Column: Assigned Jobs -->
    <div class="lg:col-span-2">
      <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
        <i class="fas fa-tasks"></i> My Assigned Jobs
      </h2>
      <div id="assignedJobs" class="space-y-6"></div>
    </div>

    <!-- Right Column: Stats + Quick Actions -->
    <div class="space-y-6">
      <!-- Earnings Card -->
      <div class="bg-zinc-900 rounded-3xl p-8">
        <p class="text-zinc-400">Today's Earnings</p>
        <p id="todayEarnings" class="text-5xl font-bold text-emerald-400 mt-3">₹450</p>
        <p class="text-sm text-zinc-500 mt-1">3 jobs completed</p>
      </div>

      <!-- Quick Stats -->
      <div class="bg-zinc-900 rounded-3xl p-8">
        <h3 class="font-semibold mb-6">My Performance</h3>
        <div class="grid grid-cols-2 gap-6">
          <div>
            <p class="text-4xl font-bold text-blue-400" id="jobsToday">3</p>
            <p class="text-sm text-zinc-400">Jobs Today</p>
          </div>
          <div>
            <p class="text-4xl font-bold text-emerald-400" id="completionRate">92%</p>
            <p class="text-sm text-zinc-400">Completion Rate</p>
          </div>
        </div>
      </div>

      <!-- Live Location -->
      <div class="bg-zinc-900 rounded-3xl p-8">
        <h3 class="font-semibold mb-4">My Current Location</h3>
        <div id="workerMap" class="h-64 rounded-2xl overflow-hidden"></div>
      </div>
    </div>
  </div>
</div>

<script>
  let workerMap = null;
  let currentWorkerLocation = { lat: 12.9716, lng: 77.5946 };

  // Sample assigned jobs (will be replaced by real data later)
  let assignedJobs = [];

  async function loadWorkerJobs() {
    // For now using same reports API (you can create a separate /api/worker-jobs later)
    const res = await fetch('/api/reports');
    const allReports = await res.json();

    // Filter only "In Progress" or "Pending" reports for demo
    assignedJobs = allReports.filter(r => r.status === 'Pending' || r.status === 'In Progress');

    renderAssignedJobs();
  }

  function renderAssignedJobs() {
    const container = document.getElementById('assignedJobs');
    container.innerHTML = '';

    if (assignedJobs.length === 0) {
      container.innerHTML = `<p class="text-zinc-400 text-center py-12">No jobs assigned yet.</p>`;
      return;
    }

    assignedJobs.forEach(job => {
      const card = document.createElement('div');
      card.className = `bg-zinc-900 rounded-3xl overflow-hidden border ${job.status === 'Completed' ? 'border-emerald-500' : 'border-zinc-700'}`;

      card.innerHTML = `
        <div class="p-6">
          <div class="flex justify-between items-start">
            <div>
              <span class="font-mono text-sm text-zinc-500">${job.id}</span>
              <p class="font-medium mt-2">${job.description}</p>
              <p class="text-sm text-zinc-400 mt-1">${job.location}</p>
            </div>
            <span class="status-badge ${job.status === 'Pending' ? 'bg-amber-500 text-black' : 'bg-blue-500 text-white'}">
              ${job.status}
            </span>
          </div>

          <div class="mt-8 flex gap-3">
            ${job.status === 'Pending' ? `
              <button onclick="acceptJob('${job.id}')" 
                class="flex-1 py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-semibold">
                Accept Job
              </button>
            ` : ''}

            ${job.status === 'In Progress' ? `
              <button onclick="completeJob('${job.id}')" 
                class="flex-1 py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-semibold">
                Mark as Completed
              </button>
            ` : ''}
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  async function acceptJob(reportId) {
    if (!confirm("Accept this cleaning job?")) return;

    await fetch(`/api/update-status/${reportId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: "In Progress" })
    });

    alert("✅ Job Accepted! Navigate to location.");
    loadWorkerJobs();
  }

  async function completeJob(reportId) {
    if (!confirm("Mark this job as Completed?")) return;

    await fetch(`/api/update-status/${reportId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: "Completed" })
    });

    alert("🎉 Job Completed! Great work!");
    loadWorkerJobs();
  }

  function initWorkerMap() {
    workerMap = L.map('workerMap').setView([currentWorkerLocation.lat, currentWorkerLocation.lng], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(workerMap);

    L.marker([currentWorkerLocation.lat, currentWorkerLocation.lng], {
      icon: L.divIcon({ html: '👷', className: 'text-4xl', iconSize: [30, 30] })
    }).addTo(workerMap);
  }

  function logout() {
    if (confirm("Logout from Worker Dashboard?")) {
      window.location.href = '/worker-login';
    }
  }

  // Initialize everything
  window.onload = () => {
    loadWorkerJobs();
    initWorkerMap();

    // Simulate location update every 5 seconds
    setInterval(() => {
      currentWorkerLocation.lat += (Math.random() - 0.5) * 0.001;
      currentWorkerLocation.lng += (Math.random() - 0.5) * 0.001;
      if (workerMap) {
        workerMap.setView([currentWorkerLocation.lat, currentWorkerLocation.lng], 15);
      }
    }, 5000);
  };
</script>
</body>
</html>
